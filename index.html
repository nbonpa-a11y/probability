<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> 確率計算ツール</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; margin: 24px; line-height: 1.5; }
      h1 { margin-bottom: 8px; }
      .desc { color: #444; margin-bottom: 20px; }
      .panel { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 18px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 12px; align-items: end; }
      label { font-weight: 600; font-size: 0.9rem; }
      input { width: 100%; padding: 8px; box-sizing: border-box; }
      button { padding: 9px 14px; border: 1px solid #999; border-radius: 6px; background: #f5f5f5; cursor: pointer; }
      button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
      button.active { background: #16a34a; border-color: #16a34a; color: #fff; }
      .result { margin-top: 10px; font-weight: 700; }
      .charts { display: grid; grid-template-columns: 1fr; gap: 20px; }
      canvas { max-height: 340px; }
      .error { color: #b91c1c; margin-top: 8px; font-weight: 700; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .chart-controls { margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1> 確率計算ツール</h1>
    <p class="desc">想定している真の発生確率をp(0≤p≤1)、試行回数をn回として入力してください。<br>その場合に 「発生回数がちょうどk回となる確率f(k)」 のグラフと、 「発生回数がk回以下となる確率F(k)」 のグラフが下に出ます。<br>kも入力すると、そのkにおけるf(k)とF(k)の値も下に出力します。<br>また切り替えボタンを押すと、F(k)のグラフや値を「k回以下」から「k回以上」に切り替えた場合のものに切り替えできます。</p>
    <div class="panel">
      <div class="grid">
        <div>
          <label for="p">真の発生確率 p (0 ≤ p ≤ 1)</label>
          <input id="p" type="number" step="any" value="0.4" />
        </div>
        <div>
          <label for="n">試行回数 n (整数)</label>
          <input id="n" type="number" step="1" min="0" value="100" />
        </div>
        <div>
          <label for="k">発生回数 k (整数)</label>
          <input id="k" type="number" step="1" min="0" value="45" />
        </div>
        <div>
          <button id="calc" class="primary">計算・グラフ更新</button>
        </div>
      </div>
      <div style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
        <button id="tailToggle"> F(k)のグラフや値を「k回以下」の場合から「k回以上」の場合に切替</button>
      </div>
      <div id="error" class="error"></div>
      <div id="pmfResult" class="result"></div>
      <div id="cdfResult" class="result"></div>
    </div>

    <div class="charts">
      <div class="panel">
        <h2>発生回数がちょうどk回となる確率f(k)</h2>
        <canvas id="pmfChart"></canvas>
        <div class="chart-controls"><button id="pmfViewToggle">グラフ全体表示</button></div>
      </div>
      <div class="panel">
        <h2 id="cdfTitle">発生回数がk回以下となる確率F(k)</h2>
        <canvas id="cdfChart"></canvas>
        <div class="chart-controls"><button id="cdfViewToggle">グラフ全体表示</button></div>
      </div>
    </div>

    <script>
      const pInput = document.getElementById('p');
      const nInput = document.getElementById('n');
      const kInput = document.getElementById('k');
      const calcBtn = document.getElementById('calc');
      const toggleBtn = document.getElementById('tailToggle');
      const err = document.getElementById('error');
      const pmfResult = document.getElementById('pmfResult');
      const cdfResult = document.getElementById('cdfResult');
      const cdfTitle = document.getElementById('cdfTitle');
      const pmfViewToggle = document.getElementById('pmfViewToggle');
      const cdfViewToggle = document.getElementById('cdfViewToggle');

      let useUpperTail = false;
      let pmfChart, cdfChart;
      let showFullPmf = false;
      let showFullCdf = false;

      function formatPercentSignificant4(probability) {
        const percent = probability * 100;
        if (percent === 0) return '0.000%';
        return `${percent.toPrecision(4)}%`;
      }

      // Lanczos approximation for numerically stable log-gamma.
      function logGamma(z) {
        const p = [
          676.5203681218851, -1259.1392167224028, 771.32342877765313,
          -176.61502916214059, 12.507343278686905, -0.13857109526572012,
          9.9843695780195716e-6, 1.5056327351493116e-7,
        ];
        if (z < 0.5) return Math.log(Math.PI) - Math.log(Math.sin(Math.PI * z)) - logGamma(1 - z);
        let x = 0.99999999999980993;
        let t = z - 1;
        for (let i = 0; i < p.length; i++) x += p[i] / (t + i + 1);
        const g = 7;
        const y = t + g + 0.5;
        return 0.5 * Math.log(2 * Math.PI) + (t + 0.5) * Math.log(y) - y + Math.log(x);
      }

      function logCombination(n, k) {
        if (k < 0 || k > n) return -Infinity;
        return logGamma(n + 1) - logGamma(k + 1) - logGamma(n - k + 1);
      }

      function binomPmf(n, p, k) {
        if (p === 0) return k === 0 ? 1 : 0;
        if (p === 1) return k === n ? 1 : 0;
        const logP = logCombination(n, k) + k * Math.log(p) + (n - k) * Math.log(1 - p);
        const v = Math.exp(logP);
        return Number.isFinite(v) ? v : 0;
      }

      function buildData(n, p) {
        const pmf = [];
        const cdf = [];
        let sum = 0;
        for (let k = 0; k <= n; k++) {
          const v = binomPmf(n, p, k);
          pmf.push(v);
          sum += v;
          cdf.push(Math.min(1, sum));
        }
        return { pmf, cdf };
      }

      function findDefaultRange(n, pmf) {
        const threshold = 1e-4;
        let left = 0;
        while (left < n && pmf[left] < threshold) left++;
        let right = n;
        while (right > 0 && pmf[right] < threshold) right--;
        if (left >= right) return { min: 0, max: Math.min(n, 100) };
        const pad = Math.max(2, Math.floor((right - left) * 0.1));
        return { min: Math.max(0, left - pad), max: Math.min(n, right + pad) };
      }

      function validInputs(p, n, k) {
        if (!(p >= 0 && p <= 1)) return 'p は 0 以上 1 以下で入力してください。';
        if (!Number.isInteger(n) || n < 0) return 'n は 0 以上の整数で入力してください。';
        if (!Number.isInteger(k) || k < 0 || k > n) return 'k は 0 以上 n 以下の整数で入力してください。';
        return '';
      }

      function update() {
        const p = Number(pInput.value);
        const n = Number(nInput.value);
        const k = Number(kInput.value);

        const message = validInputs(p, n, k);
        if (message) {
          err.textContent = message;
          pmfResult.textContent = '';
          cdfResult.textContent = '';
          return;
        }
        err.textContent = '';

        const ks = Array.from({ length: n + 1 }, (_, i) => i);
        const { pmf, cdf } = buildData(n, p);
        const defaultRange = findDefaultRange(n, pmf);
        const pmfXRange = showFullPmf ? { min: 0, max: n } : defaultRange;
        const cdfXRange = showFullCdf ? { min: 0, max: n } : defaultRange;
        pmfViewToggle.textContent = showFullPmf ? '省略表示に戻す' : 'グラフ全体表示';
        cdfViewToggle.textContent = showFullCdf ? '省略表示に戻す' : 'グラフ全体表示';

        const pmfAtK = pmf[k] * 100;
        const lowerAtK = cdf[k] * 100;
        const upperAtK = 100 - (k === 0 ? 0 : cdf[k - 1] * 100);

        pmfResult.innerHTML = `<span class="mono">発生回数がちょうど${k}回となる確率f(${k}) = ${pmfAtK.toPrecision(6)} %</span>`;

        if (useUpperTail) {
          cdfResult.innerHTML = `<span class="mono">発生回数が${k}回以上となる確率F(${k}) = ${upperAtK.toPrecision(6)} %</span>`;
          cdfTitle.textContent = '発生回数がk回以上となる確率F(k)';
          toggleBtn.textContent = 'F(k)を「k回以下」の場合に切替';
          toggleBtn.classList.add('active');
        } else {
          cdfResult.innerHTML = `<span class="mono">発生回数が${k}回以下となる確率F(${k}) = ${lowerAtK.toPrecision(6)} %</span>`;
          cdfTitle.textContent = '発生回数がk回以下となる確率F(k)';
          toggleBtn.textContent = 'F(k)を「k回以上」の場合に切替';
          toggleBtn.classList.remove('active');
        }

        const cdfForPlot = useUpperTail
          ? ks.map((x) => 1 - (x === 0 ? 0 : cdf[x - 1]))
          : cdf;

        if (pmfChart) pmfChart.destroy();
        if (cdfChart) cdfChart.destroy();

        pmfChart = new Chart(document.getElementById('pmfChart'), {
          type: 'bar',
          data: {
            labels: ks,
            datasets: [{ label: 'f(k)=P(X=k)', data: pmf }],
          },
          options: {
            plugins: {
              tooltip: {
                callbacks: {
                  label: (context) => `${context.dataset.label}: ${formatPercentSignificant4(context.parsed.y)}`,
                },
              },
            },
            scales: {
              x: { title: { display: true, text: '発生回数 k' }, min: pmfXRange.min, max: pmfXRange.max },
              y: {
                title: { display: true, text: '確率 (%)' },
                ticks: {
                  callback: (value) => `${(Number(value) * 100).toFixed(0)}%`,
                },
              },
            },
          },
        });

        cdfChart = new Chart(document.getElementById('cdfChart'), {
          type: 'line',
          data: {
            labels: ks,
            datasets: [{ label: useUpperTail ? 'P(X≥k)' : 'F(k)=P(X≤k)', data: cdfForPlot, stepped: true }],
          },
          options: {
            plugins: {
              tooltip: {
                callbacks: {
                  label: (context) => `${context.dataset.label}: ${formatPercentSignificant4(context.parsed.y)}`,
                },
              },
            },
            scales: {
              x: { title: { display: true, text: '発生回数 k' }, min: cdfXRange.min, max: cdfXRange.max },
              y: {
                title: { display: true, text: '確率 (%)' },
                min: 0,
                max: 1,
                ticks: {
                  callback: (value) => `${(Number(value) * 100).toFixed(0)}%`,
                },
              },
            },
          },
        });
      }

      calcBtn.addEventListener('click', update);
      toggleBtn.addEventListener('click', () => { useUpperTail = !useUpperTail; update(); });
      pmfViewToggle.addEventListener('click', () => { showFullPmf = !showFullPmf; update(); });
      cdfViewToggle.addEventListener('click', () => { showFullCdf = !showFullCdf; update(); });
      update();
    </script>
  </body>
</html>
